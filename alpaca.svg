<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <!-- Background circle -->
  <circle cx="54" cy="54" r="54" fill="#BB86FC"/>

  <!-- Body -->
  <ellipse cx="54" cy="72" rx="22" ry="18" fill="#F5E6C8"/>

  <!-- Neck -->
  <rect x="46" y="50" width="16" height="22" rx="8" fill="#F5E6C8"/>

  <!-- Head -->
  <ellipse cx="54" cy="44" rx="14" ry="13" fill="#F5E6C8"/>

  <!-- Fluffy top (alpaca fur) -->
  <ellipse cx="54" cy="31" rx="12" ry="9" fill="#FFFFFF"/>
  <ellipse cx="44" cy="33" rx="7" ry="7" fill="#FFFFFF"/>
  <ellipse cx="64" cy="33" rx="7" ry="7" fill="#FFFFFF"/>
  <ellipse cx="49" cy="28" rx="7" ry="6" fill="#FFFFFF"/>
  <ellipse cx="59" cy="28" rx="7" ry="6" fill="#FFFFFF"/>
  <ellipse cx="54" cy="25" rx="6" ry="5" fill="#FFFFFF"/>

  <!-- Ears -->
  <ellipse cx="42" cy="37" rx="5" ry="7" fill="#F5E6C8" transform="rotate(-15 42 37)"/>
  <ellipse cx="66" cy="37" rx="5" ry="7" fill="#F5E6C8" transform="rotate(15 66 37)"/>
  <ellipse cx="42" cy="37" rx="3" ry="5" fill="#E8B4B8" transform="rotate(-15 42 37)"/>
  <ellipse cx="66" cy="37" rx="3" ry="5" fill="#E8B4B8" transform="rotate(15 66 37)"/>

  <!-- Eyes -->
  <circle cx="48" cy="42" r="2.5" fill="#3D2B1F"/>
  <circle cx="60" cy="42" r="2.5" fill="#3D2B1F"/>
  <circle cx="48.8" cy="41.2" r="0.8" fill="#FFFFFF"/>
  <circle cx="60.8" cy="41.2" r="0.8" fill="#FFFFFF"/>

  <!-- Nose -->
  <ellipse cx="54" cy="49" rx="4" ry="2.5" fill="#E8B4B8"/>
  <circle cx="52" cy="49" r="1" fill="#C07080"/>
  <circle cx="56" cy="49" r="1" fill="#C07080"/>

  <!-- Legs -->
  <rect x="38" y="84" width="8" height="14" rx="4" fill="#F5E6C8"/>
  <rect x="62" y="84" width="8" height="14" rx="4" fill="#F5E6C8"/>
  <rect x="44" y="86" width="8" height="12" rx="4" fill="#F5E6C8"/>
  <rect x="56" y="86" width="8" height="12" rx="4" fill="#F5E6C8"/>

  <!-- Hooves -->
  <rect x="38" y="95" width="8" height="5" rx="2.5" fill="#8B6F47"/>
  <rect x="62" y="95" width="8" height="5" rx="2.5" fill="#8B6F47"/>
  <rect x="44" y="95" width="8" height="5" rx="2.5" fill="#8B6F47"/>
  <rect x="56" y="95" width="8" height="5" rx="2.5" fill="#8B6F47"/>
